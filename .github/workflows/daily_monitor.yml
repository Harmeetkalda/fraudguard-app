name: Daily Model Monitor

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  daily-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install lightgbm scikit-learn pandas numpy joblib

    - name: Run daily monitor
      run: python daily_monitor.py

    - name: Commit activity log
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "FraudGuard Monitor"
        git pull --rebase origin main
        git add logs/
        git diff --staged --quiet || git commit -m "Daily monitor: $(date +'%Y-%m-%d') - model health check"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
