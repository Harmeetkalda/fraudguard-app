name: Daily Model Monitor

on:
  schedule:
    - cron: '0 9 * * *'  # runs every day at 9am
  workflow_dispatch:

jobs:
  daily-monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install lightgbm scikit-learn pandas numpy joblib
    
    - name: Run daily monitor
      run: python daily_monitor.py
    
    - name: Commit activity log
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "FraudGuard Monitor"
        git add logs/
        git diff --staged --quiet || git commit -m "Daily monitor: $(date +'%Y-%m-%d') - model health check"
        git push